name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # @boardwalk-labs/workflow isn't on npm yet; this repo consumes it via a pnpm override
      # (link:../sdk). Clone + build the public SDK sibling at ../sdk so its types resolve for
      # lint/typecheck/build. Remove this step once the SDK publishes to the registry.
      - name: Build the sibling SDK (../sdk)
        run: |
          git clone --depth 1 https://github.com/boardwalk-labs/sdk.git "$GITHUB_WORKSPACE/../sdk"
          cd "$GITHUB_WORKSPACE/../sdk"
          pnpm install --no-frozen-lockfile
          pnpm build
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Inspect publish contents
        run: npm pack --dry-run
