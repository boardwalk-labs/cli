# Publish to npm with provenance on a version tag (v0.1.0 -> @boardwalk-labs/cli@0.1.0), then bump
# the Homebrew tap.
#
# Auth: npm Trusted Publishing via GitHub OIDC (no stored token). Configure the trusted publisher
# for @boardwalk-labs/cli on npmjs.com: org boardwalk-labs, repo boardwalk-labs/cli, workflow
# .github/workflows/release.yml.
#
# Publish guard: the pnpm `link:` override on @boardwalk-labs/workflow is an incubation-only device.
# Publishing with it present would ship a CLI whose lockfile never exercised the real registry
# dependency, so the guard step blocks the release until it is removed (cut over to the npm SDK).
#
# Homebrew: bump-homebrew updates boardwalk-labs/homebrew-tap; needs the HOMEBREW_TAP_TOKEN secret
# (a token with write access to that tap repo). brew-smoke-test installs the bumped formula.

name: Release

on:
  push:
    tags: ["v*"]

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance (Trusted Publishing)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: "No link: overrides in a release"
        run: |
          if node -p "JSON.stringify(require('./package.json').pnpm?.overrides ?? {})" | grep -q "link:"; then
            echo "package.json still has a link: override; remove it and lock against the registry first" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2
            exit 1
          fi
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Trusted Publishing needs a recent npm (>= 11.5.1); node 24's bundled npm may be older.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public

  bump-homebrew:
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }} # skip prereleases
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the npm registry to propagate
        run: sleep 30
      - name: Update the Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          TARBALL_URL="https://registry.npmjs.org/@boardwalk-labs/cli/-/cli-${VERSION}.tgz"
          SHA256=$(curl -sSL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "version=$VERSION  sha256=$SHA256"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/boardwalk-labs/homebrew-tap.git" tap
          cd tap
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/boardwalk.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/boardwalk.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/boardwalk.rb
          git diff --cached --quiet && { echo "no formula change; skipping commit"; exit 0; }
          git commit -m "boardwalk ${VERSION}"
          git push

  brew-smoke-test:
    needs: bump-homebrew
    if: ${{ !contains(github.ref_name, '-') }} # skip prereleases
    runs-on: macos-latest
    steps:
      - name: Install + test the freshly-bumped formula
        env:
          HOMEBREW_NO_ANALYTICS: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        # Homebrew passes npm `--min-release-age` (a supply-chain guard against freshly-published
        # versions). Right after a release, this repo's just-published SDK dep (@boardwalk-labs/workflow)
        # is younger than that threshold and gets filtered out -> `npm` errors ENOVERSIONS and brew
        # install fails, even though the formula is correct and the package installs fine once it ages
        # (~a day). Treat *that specific* condition as a skip-with-warning; any OTHER failure is real.
        run: |
          brew update
          if out=$(brew install --verbose boardwalk-labs/tap/boardwalk 2>&1); then
            echo "$out"
            brew test boardwalk-labs/tap/boardwalk
          else
            echo "$out"
            if echo "$out" | grep -q "ENOVERSIONS"; then
              echo "::warning title=brew smoke skipped::A just-published dependency is newer than Homebrew's npm --min-release-age guard, so brew install reports ENOVERSIONS. This self-heals as the version ages (~a day); the formula is otherwise valid. Skipping."
            else
              echo "::error::brew install failed for a non-transient reason"
              exit 1
            fi
          fi
